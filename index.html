<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Plantas - Relatório Dinâmico</title>
    <style>
        :root {
            --primary-color: #2E8B57; /* Verde Mar Floresta */
            --secondary-color: #3CB371; /* Verde Mar Médio */
            --alert-color: #FFA500; /* Laranja */
            --critical-color: #DC143C; /* Vermelho Carmesim */
            --background-color: #F0F8F0; /* Verde Menta Mel */
            --card-background: #FFFFFF;
            --text-color: #333;
            --header-text-color: #FFFFFF;
            --border-color: #DDDDDD;
            --box-shadow-color: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        h1, h2.location-header {
            color: var(--primary-color);
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .controls {
            padding: 20px;
            background-color: var(--card-background);
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--box-shadow-color);
            margin-bottom: 25px;
        }

        .search-box {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
        }
        
        .summary-section {
            padding: 20px;
            background-color: var(--card-background);
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--box-shadow-color);
            margin-bottom: 25px;
        }
        .summary-section h2 { margin-top: 0; text-align: center; }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .plant-card {
            background-color: var(--card-background);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 8px var(--box-shadow-color);
            width: 280px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .plant-card:hover { transform: translateY(-5px); box-shadow: 0 8px 16px var(--box-shadow-color); }

        .card-image-container {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f0f0;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            overflow: hidden;
        }
        .card-image-container img { width: 100%; height: 100%; object-fit: cover; }
        .no-photo { font-style: italic; color: #888; }
        
        .card-content { padding: 15px; flex-grow: 1; }
        .card-content h3 { margin-top: 0; color: var(--primary-color); }
        .card-content p { margin: 5px 0; font-size: 14px; }
        .card-content .scientific-name { font-style: italic; color: #555; }
        
        .card-footer { padding: 15px; border-top: 1px solid #eee; }
        .search-btn {
            background-color: #4A90E2; color: white; padding: 8px 12px;
            border: none; border-radius: 4px; text-decoration: none;
            font-size: 14px; cursor: pointer; display: block; text-align: center;
        }
        .search-btn:hover { background-color: #357ABD; }
        
        .status { font-weight: bold; }
        .status.alerta { color: var(--alert-color); }
        .status.critico { color: var(--critical-color); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Catálogo de Plantas</h1>

        <div class="controls">
            <input type="text" id="searchInput" class="search-box" onkeyup="filterContent()" placeholder="Pesquisar por nome, local ou status...">
        </div>

        <div id="summary-container" class="summary-section"></div>
        
        <div id="sections-container"></div>
    </div>

    <script>
        const plantData = [

          { "id": 18, "nome_popular": "Pitangueira", "nome_cientifico": "Eugenia uniflora", "localizacao": "Jardim da Frente", "status": "Saudável", "ultima_atualizacao": "23/04/2026", "link_foto_real": "https://cdn.jsdelivr.net/gh/mateuspmed/jardineiro_virtual/garden_photos/pitangueira.jpg" },
          { "id": 19, "nome_popular": "Sapatinho de Judia", "nome_cientifico": "Thunbergia mysorensis", "localizacao": "Jardim da Frente", "status": "Ativa", "ultima_atualizacao": "23/04/2026", "link_foto_real": "https://cdn.jsdelivr.net/gh/mateuspmed/jardineiro_virtual/garden_photos/sapatinho_judia.jpg" },

          { "id": 25, "nome_popular": "Dracena Madagascar", "nome_cientifico": "Dracaena marginata", "localizacao": "Corredor", "status": "Saudável", "ultima_atualizacao": "23/04/2026", "link_foto_real": "https://cdn.jsdelivr.net/gh/mateuspmed/jardineiro_virtual/garden_photos/dracena_madagascar.jpg" },
          { "id": 26, "nome_popular": "Hera-roxa", "nome_cientifico": "Hemigraphis alternata", "localizacao": "Corredor", "status": "Saudável", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" },
          { "id": 27, "nome_popular": "Helicônia Garrancho", "nome_cientifico": "Heliconia angusta", "localizacao": "Corredor", "status": "Alerta: Lesmas/Pontas Secas", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" },
          { "id": 28, "nome_popular": "Hortelã", "nome_cientifico": "Mentha spicata", "localizacao": "Hortaliças", "status": "Viçosa", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" },
          { "id": 29, "nome_popular": "Manjericão", "nome_cientifico": "Ocimum basilicum", "localizacao": "Hortaliças", "status": "Saudável", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" },
          { "id": 30, "nome_popular": "Tomateiro", "nome_cientifico": "Solanum lycopersicum", "localizacao": "Hortaliças", "status": "Precisa Apoio", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" },
          { "id": 31, "nome_popular": "Cebolinha", "nome_cientifico": "Allium fistulosum", "localizacao": "Hortaliças", "status": "Saudável", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" },
          { "id": 32, "nome_popular": "Pimenta Malagueta", "nome_cientifico": "Capsicum frutescens", "localizacao": "Hortaliças", "status": "Crítico: Seca", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" },
          { "id": 33, "nome_popular": "Alpínia", "nome_cientifico": "Alpinia purpurata", "localizacao": "Calçada Externa", "status": "Saudável", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" },
          { "id": 34, "nome_popular": "Jabuticabeira", "nome_cientifico": "Plinia cauliflora", "localizacao": "Calçada Externa", "status": "Saudável", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" },
          { "id": 35, "nome_popular": "Ipê Amarelo", "nome_cientifico": "Handroanthus albus", "localizacao": "Calçada Externa", "status": "Saudável", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" },
          { "id": 36, "nome_popular": "Ipê Rosa", "nome_cientifico": "Handroanthus impetiginosus", "localizacao": "Calçada Externa", "status": "Saudável", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" },
          { "id": 37, "nome_popular": "Ipê Branco", "nome_cientifico": "Tabebuia roseo-alba", "localizacao": "Calçada Externa", "status": "Saudável", "ultima_atualizacao": "23/04/2026", "link_foto_real": "" }
        ];

        const groupDataByLocation = () => {
            return plantData.reduce((acc, plant) => {
                const location = plant.localizacao;
                if (!acc[location]) acc[location] = [];
                acc[location].push(plant);
                return acc;
            }, {});
        };

        const generateSummary = () => {
            const summaryContainer = document.getElementById('summary-container');
            const dataByLocation = groupDataByLocation();
            
            let summaryHTML = '<h2>Resumo por Localização</h2><div class="table-wrapper"><table><thead><tr><th>Local</th><th>Plantas Mapeadas</th><th>Com Foto</th><th>Com Alerta</th></tr></thead><tbody>';
            
            for (const location in dataByLocation) {
                const plants = dataByLocation[location];
                const total = plants.length;
                const withPhoto = plants.filter(p => p.link_foto_real).length;
                const withAlert = plants.filter(p => {
                    const statusLower = p.status.toLowerCase();
                    return statusLower.includes('alerta') || statusLower.includes('crítico') || statusLower.includes('manchas') || statusLower.includes('seca');
                }).length;
                
                summaryHTML += `<tr><td>${location}</td><td>${total}</td><td>${withPhoto}</td><td>${withAlert}</td></tr>`;
            }
            
            summaryHTML += '</tbody></table></div>';
            summaryContainer.innerHTML = summaryHTML;
        };
        
        const generateSections = () => {
            const sectionsContainer = document.getElementById('sections-container');
            sectionsContainer.innerHTML = '';
            const dataByLocation = groupDataByLocation();
            
            for (const location in dataByLocation) {
                const section = document.createElement('section');
                let cardsHTML = `<h2 class="location-header">${location}</h2><div class="cards-container">`;
                
                for (const plant of dataByLocation[location]) {
                    const encodedName = encodeURIComponent(plant.nome_cientifico);
                    const googleSearchUrl = `https://www.google.com/search?tbm=isch&q=${encodedName}`;
                    
                    let statusClass = '';
                    if (plant.status.toLowerCase().includes('alerta')) statusClass = 'alerta';
                    if (plant.status.toLowerCase().includes('crítico') || plant.status.toLowerCase().includes('seca')) statusClass = 'critico';
                    
                    cardsHTML += `
                        <div class="plant-card" data-filter-content="${Object.values(plant).join(' ').toLowerCase()}">
                            <div class="card-image-container">
                                ${plant.link_foto_real 
                                    ? `<img src="${plant.link_foto_real}" alt="${plant.nome_popular}">`
                                    : '<span class="no-photo">Sem Foto</span>'}
                            </div>
                            <div class="card-content">
                                <h3>${plant.nome_popular}</h3>
                                <p class="scientific-name">${plant.nome_cientifico}</p>
                                <p><strong>Status:</strong> <span class="status ${statusClass}">${plant.status}</span></p>
                            </div>
                            <div class="card-footer">
                                <a href="${googleSearchUrl}" target="_blank" class="search-btn">Ver Imagens</a>
                            </div>
                        </div>`;
                }
                
                cardsHTML += '</div>';
                section.innerHTML = cardsHTML;
                sectionsContainer.appendChild(section);
            }
        };

        const filterContent = () => {
            const filter = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.plant-card').forEach(card => {
                const content = card.getAttribute('data-filter-content');
                card.style.display = content.includes(filter) ? '' : 'none';
            });
        };

        document.addEventListener('DOMContentLoaded', () => {
            generateSummary();
            generateSections();
        });
    </script>
</body>
</html>
