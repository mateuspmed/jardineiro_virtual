<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Relatório Interativo de Plantas</title>
    <style>
        :root {
            --primary-color: #2E8B57; /* Verde Mar Floresta */
            --secondary-color: #3CB371; /* Verde Mar Médio */
            --background-color: #F0F8F0; /* Verde Menta Mel */
            --text-color: #333;
            --header-text-color: #FFFFFF;
            --table-border-color: #DDDDDD;
            --table-hover-color: #E9F5E9;
            --box-shadow-color: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--box-shadow-color);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        h2.location-header {
            color: var(--primary-color);
            border-bottom: 1px solid var(--secondary-color);
            padding-bottom: 8px;
            margin-top: 40px;
        }

        .summary-section {
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 5px solid var(--primary-color);
            margin-bottom: 25px;
            border-radius: 5px;
        }
        
        .summary-section h2 {
            margin-top: 0;
            color: var(--primary-color);
        }
        
        .summary-section p { margin: 5px 0; }

        .controls {
            display: flex;
            margin-bottom: 25px;
        }

        .search-box {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid var(--table-border-color);
            border-radius: 5px;
            font-size: 16px;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(46, 139, 87, 0.5);
        }
        
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid var(--table-border-color); padding: 12px 15px; text-align: left; vertical-align: middle; }
        thead { background-color: var(--secondary-color); color: var(--header-text-color); }
        tr:hover { background-color: var(--table-hover-color); }
        img { max-width: 80px; max-height: 80px; border-radius: 5px; display: block; margin: auto; transition: transform 0.2s; }
        img:hover { transform: scale(1.5); }

        .search-btn {
            background-color: #4A90E2;
            color: white;
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
            display: inline-block;
        }
        .search-btn:hover { background-color: #357ABD; }
    </style>
</head>

        function generateSummary() {
            const summaryContainer = document.getElementById('summary-container');
            const totalPlants = plantData.length;
            const statusCounts = plantData.reduce((acc, plant) => {
                acc[plant.status] = (acc[plant.status] || 0) + 1;
                return acc;
            }, {});

            let summaryHTML = '<h2>Resumo do Jardim</h2>';
            summaryHTML += `<p><strong>Total de Plantas:</strong> ${totalPlants}</p>`;
            summaryHTML += '<strong>Status:</strong><ul>';
            for (const status in statusCounts) {
                summaryHTML += `<li>${status}: ${statusCounts[status]}</li>`;
            }
            summaryHTML += '</ul>';
            
            summaryContainer.innerHTML = summaryHTML;
        }
        
        function generateSections() {
            const sectionsContainer = document.getElementById('sections-container');
            sectionsContainer.innerHTML = '';
            
            const plantsByLocation = plantData.reduce((acc, plant) => {
                const location = plant.localizacao;
                if (!acc[location]) {
                    acc[location] = [];
                }
                acc[location].push(plant);
                return acc;
            }, {});
            
            for (const location in plantsByLocation) {
                const section = document.createElement('div');
                section.className = 'location-section';
                
                let sectionHTML = `<h2 class="location-header">${location}</h2>`;
                sectionHTML += `<div class="table-wrapper"><table class="plant-table"><thead><tr>
                    <th>ID</th><th>Foto</th><th>Nome Popular</th><th>Nome Científico</th><th>Status</th><th>Busca</th>
                </tr></thead><tbody>`;
                
                for (const plant of plantsByLocation[location]) {
                    const encodedName = encodeURIComponent(plant.nome_cientifico);
                    const googleSearchUrl = `https://www.google.com/search?tbm=isch&q=${encodedName}`;
                    const foto = plant.link_foto_real 
                        ? `<a href='${plant.link_foto_real}' target='_blank'><img src='${plant.link_foto_real}' alt='${plant.nome_popular}'></a>`
                        : 'Sem foto';
                        
                    sectionHTML += `
                        <tr class="plant-row">
                            <td>${plant.id}</td>
                            <td>${foto}</td>
                            <td>${plant.nome_popular}</td>
                            <td><i>${plant.nome_cientifico}</i></td>
                            <td>${plant.status}</td>
                            <td><a href="${googleSearchUrl}" target="_blank" class="search-btn">Imagens</a></td>
                        </tr>`;
                }
                
                sectionHTML += '</tbody></table></div>';
                section.innerHTML = sectionHTML;
                sectionsContainer.appendChild(section);
            }
        }

        function filterContent() {
            const filter = document.getElementById('searchInput').value.toUpperCase();
            const rows = document.querySelectorAll('.plant-row');
            
            rows.forEach(row => {
                const text = row.textContent || row.innerText;
                if (text.toUpperCase().indexOf(filter) > -1) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            generateSummary();
            generateSections();
        });
    </script>

</html>
