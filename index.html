<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Interativo de Plantas</title>
    <style>
        :root {
            --primary-color: #2E8B57; /* Verde Mar Floresta */
            --secondary-color: #3CB371; /* Verde Mar Médio */
            --background-color: #F0F8F0; /* Verde Menta Mel */
            --text-color: #333;
            --header-text-color: #FFFFFF;
            --table-border-color: #DDDDDD;
            --table-hover-color: #E9F5E9;
            --box-shadow-color: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--box-shadow-color);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
        }

        .search-box {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid var(--table-border-color);
            border-radius: 5px;
            font-size: 16px;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(46, 139, 87, 0.5);
        }
        
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid var(--table-border-color);
            padding: 12px 15px;
            text-align: left;
            vertical-align: middle;
        }

        thead {
            background-color: var(--secondary-color);
            color: var(--header-text-color);
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: var(--table-hover-color);
        }

        img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 5px;
            display: block;
            margin: auto;
            transition: transform 0.2s;
        }
        
        img:hover {
            transform: scale(1.5);
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }
        
        .status-cell {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Catálogo Interativo de Plantas</h1>

        <div class="controls">
            <input type="text" id="searchInput" class="search-box" onkeyup="filterTable()" placeholder="Pesquisar por nome, local ou status...">
        </div>
        
        <div class="table-wrapper">
            <table id="plantTable">

                        <th>Localização</th>
                        <th class="status-cell">Status</th>
                        <th>Última Atualização</th>
                    </tr>

                <tbody>

            </table>
        </div>
    </div>

        ];

        function populateTable(data) {
            const tableBody = document.getElementById('plantTable').getElementsByTagName('tbody')[0];
            tableBody.innerHTML = ''; // Limpa a tabela antes de preencher
            
            data.forEach(plant => {
                let row = tableBody.insertRow();
                row.insertCell(0).innerHTML = plant.id;
                
                let photoCell = row.insertCell(1);
                if (plant.link_foto_real) {
                    photoCell.innerHTML = `<a href='${plant.link_foto_real}' target='_blank'><img src='${plant.link_foto_real}' alt='${plant.nome_popular}'></a>`;
                } else {
                    photoCell.innerHTML = 'Sem foto';
                }
                
                row.insertCell(2).innerHTML = plant.nome_popular;
                row.insertCell(3).innerHTML = `<i>${plant.nome_cientifico}</i>`;
                row.insertCell(4).innerHTML = plant.localizacao;
                row.insertCell(5).innerHTML = plant.status;
                row.insertCell(6).innerHTML = plant.ultima_atualizacao;
            });
        }

        function filterTable() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toUpperCase();
            
            const filteredData = plantData.filter(plant => {
                return plant.nome_popular.toUpperCase().includes(filter) ||
                       plant.nome_cientifico.toUpperCase().includes(filter) ||
                       plant.localizacao.toUpperCase().includes(filter) ||
                       plant.status.toUpperCase().includes(filter);
            });
            
            populateTable(filteredData);
        }

        // Preenche a tabela na carga inicial da página
        document.addEventListener('DOMContentLoaded', () => {
            populateTable(plantData);
        });

</html>
