<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardineiro Virtual - Relatório de Plantas</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .header-container {
            max-width: 1600px;
            margin: 0 auto 20px auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2d6a4f;
            margin-top: 0;
        }
        #summary {
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .summary-table th, .summary-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .summary-table th {
            background-color: #d8f3dc;
            color: #1b4332;
        }
        .summary-table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .summary-table tfoot td {
            font-weight: bold;
            background-color: #e9ecef;
        }
        #filters {
            text-align: center;
            margin-bottom: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        #filters button {
            background-color: #2d6a4f;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #filters button:hover {
            background-color: #1b4332;
        }
        .location-header {
            width: 100%;
            grid-column: 1 / -1;
            padding: 10px;
            background-color: #d8f3dc;
            color: #1b4332;
            border-radius: 5px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #e0e0e0;
        }
        .card-content {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .card-content h3 {
            margin: 0 0 5px 0;
            color: #1b4332;
        }
        .card-content p {
            margin: 4px 0;
            font-size: 0.9em;
            color: #555;
            line-height: 1.4;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            display: inline-block;
        }
        .tooltip-container {
            position: relative;
            display: inline-block;
        }
        .tooltip-container .tooltip-text {
            visibility: hidden;
            width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -125px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.85em;
            font-weight: normal;
        }
        .tooltip-container:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        .status-badge[data-tooltip-active="true"] {
             cursor: help;
             border-bottom: 1px dotted #000;
        }
    </style>
</head>

        ];

        const container = document.getElementById('plant-container');
        const summaryContainer = document.getElementById('summary');
        const filtersContainer = document.getElementById('filters');

        function getStatusColor(status) {
            const lowerStatus = status.toLowerCase();
            if (lowerStatus.includes('crítico') || lowerStatus.includes('suspeita')) {
                return '#dc3545'; // Vermelho
            } else if (lowerStatus.includes('alerta') || lowerStatus.includes('verificar')) {
                return '#ffc107'; // Amarelo
            } else if (lowerStatus.includes('saudável') || lowerStatus.includes('ativa') || lowerStatus.includes('viçosa')) {
                return '#28a745'; // Verde
            } else {
                return '#6c757d'; // Cinza
            }
        }

        function generateSummary() {
            const locations = [...new Set(plantData.map(p => p.localizacao))].sort();
            
            let tableHtml = `<table class="summary-table">
                <thead>
                    <tr>
                        <th>Local</th>
                        <th>Qtd. Plantas</th>
                        <th>Qtd. com Foto</th>
                        <th>Qtd. em Alerta</th>
                    </tr>
                </thead>
                <tbody>`;

            let totalPlants = 0;
            let totalWithPhotos = 0;
            let totalInAlert = 0;

            locations.forEach(location => {
                const plantsInLocation = plantData.filter(p => p.localizacao === location);
                const countTotal = plantsInLocation.length;
                const countWithPhoto = plantsInLocation.filter(p => p.link_foto_real && p.link_foto_real.trim() !== '').length;
                const countInAlert = plantsInLocation.filter(p => {
                    const lowerStatus = p.status.toLowerCase();
                    return lowerStatus.includes('alerta') || lowerStatus.includes('crítico') || lowerStatus.includes('suspeita') || lowerStatus.includes('verificar');
                }).length;

                tableHtml += `<tr>
                                <td>${location}</td>
                                <td>${countTotal}</td>
                                <td>${countWithPhoto}</td>
                                <td>${countInAlert}</td>
                             </tr>`;
                
                totalPlants += countTotal;
                totalWithPhotos += countWithPhoto;
                totalInAlert += countInAlert;
            });

            tableHtml += `</tbody>
                <tfoot>
                    <tr>
                        <td>Total</td>
                        <td>${totalPlants}</td>
                        <td>${totalWithPhotos}</td>
                        <td>${totalInAlert}</td>
                    </tr>
                </tfoot>
            </table>`;
            
            summaryContainer.innerHTML = tableHtml;
        }

        function generateFilters() {
            const locations = [...new Set(plantData.map(p => p.localizacao))].sort();
            let filtersHtml = `<button onclick="renderPlants('all')">Exibir Todas</button>`;
            locations.forEach(location => {
                filtersHtml += `<button onclick="renderPlants('${location}')">${location}</button>`;
            });
            filtersContainer.innerHTML = filtersHtml;
        }

        function renderPlants(filter = 'all') {
            container.innerHTML = '';
            
            const groupedByLocation = plantData.reduce((acc, plant) => {
                (acc[plant.localizacao] = acc[plant.localizacao] || []).push(plant);
                return acc;
            }, {});

            const sortedLocations = Object.keys(groupedByLocation).sort();

            sortedLocations.forEach(location => {
                if (filter === 'all' || filter === location) {
                    const locationHeader = document.createElement('h2');
                    locationHeader.className = 'location-header';
                    locationHeader.textContent = location;
                    container.appendChild(locationHeader);

                    groupedByLocation[location].forEach(planta => {
                        const hasActionPlan = planta.plano_de_acao && planta.plano_de_acao.trim() !== '';
                        
                        let statusHtml = `
                            <span class="status-badge" style="background-color: ${getStatusColor(planta.status)}; color: white;">
                                ${planta.status}
                            </span>`;

                        if (hasActionPlan) {
                            statusHtml = `
                                <div class="tooltip-container">
                                    <span class="status-badge" style="background-color: ${getStatusColor(planta.status)}; color: white;" data-tooltip-active="true">
                                        ${planta.status}
                                    </span>
                                    <span class="tooltip-text">${planta.plano_de_acao}</span>
                                </div>`;
                        }

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="${planta.link_foto_real || 'https://via.placeholder.com/300x200.png?text=Sem+Imagem'}" alt="Foto de ${planta.nome_popular}" class="card-image">
                            <div class="card-content">
                                <h3>${planta.nome_popular} (ID: ${planta.id})</h3>
                                <p><em>${planta.nome_cientifico}</em></p>
                                <p><strong>Local:</strong> ${planta.localizacao}</p>
                                <p><strong>Última Análise:</strong> ${planta.ultima_atualizacao}</p>
                                <p><strong>Status:</strong> ${statusHtml}</p>
                            </div>`;
                        container.appendChild(card);
                    });
                }
            });
        }

        // Gera a visualização inicial
        generateSummary();
        generateFilters();
        renderPlants();
    </script>

</body>
</html>
