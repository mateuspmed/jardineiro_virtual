        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2d6a4f;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #e0e0e0;
        }
        .card-content {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .card-content h3 {
            margin: 0 0 5px 0;
            color: #1b4332;
        }
        .card-content p {
            margin: 2px 0;
            font-size: 0.9em;
            color: #555;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            display: inline-block;
            margin-top: auto;
            align-self: flex-start;
        }
        /* Estilo do Tooltip */
        .tooltip-container {
            position: relative;
            display: inline-block;
        }
        .tooltip-container .tooltip-text {
            visibility: hidden;
            width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 1;
            bottom: 125%; /* Position above the status */
            left: 50%;
            margin-left: -125px; /* Use half of the width to center */
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.85em;
            font-weight: normal;
            white-space: normal;
        }
        .tooltip-container:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        .status-badge[data-tooltip-active="true"] {
             cursor: help;
             border-bottom: 1px dotted #000;
        }
    </style>
</head>

        function getStatusColor(status) {
            const lowerStatus = status.toLowerCase();
            if (lowerStatus.includes('crítico') || lowerStatus.includes('alerta') || lowerStatus.includes('suspeita')) {
                return '#ffc107'; // Amarelo/Laranja para alerta
            } else if (lowerStatus.includes('saudável') || lowerStatus.includes('ativa')) {
                return '#28a745'; // Verde para saudável
            } else {
                return '#6c757d'; // Cinza para outros status
            }
        }

        const container = document.getElementById('plant-container');

            const hasActionPlan = planta.plano_de_acao && planta.plano_de_acao.trim() !== '';

            // Status HTML com ou sem tooltip
            let statusHtml = `
                <span class="status-badge" style="background-color: ${getStatusColor(planta.status)}; color: white;">
                    ${planta.status}
                </span>`;

            if (hasActionPlan) {
                statusHtml = `
                    <div class="tooltip-container">
                        <span class="status-badge" style="background-color: ${getStatusColor(planta.status)}; color: white;" data-tooltip-active="true">

                        </span>
                        <span class="tooltip-text">${planta.plano_de_acao}</span>
                    </div>`;
            }

            const card = `
                <div class="card">
                    <img src="${planta.link_foto_real || 'https://via.placeholder.com/300x200.png?text=Sem+Imagem'}" alt="Foto de ${planta.nome_popular}" class="card-image">
                    <div class="card-content">

                        <p><strong>Local:</strong> ${planta.localizacao}</p>
                        <p><strong>Última Análise:</strong> ${planta.ultima_atualizacao}</p>
                        <p><strong>Status:</strong> ${statusHtml}</p>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
